# Per-file real-MSVC-7.10 syntax check (tools/msvc-env/msvc_syntax_check.sh) on
# GitHub-hosted runners. Informational: uploads the results CSV and writes a
# clean/total summary, but never fails the build on compile errors.
#
# The MSVC 7.10 toolchain is proprietary and NOT in the repo. It is pulled from
# the msvc7.zip asset on the 0.1.0 release (the zip contains msvc7/bin/cl.exe
# etc. at its root, so it unpacks straight into tools/msvc-env/). The tree is
# cached between runs so the ~91 MB download only happens on a cache miss.
#
# Not run per-PR: the full 1781-file sweep runs cl.exe under Wine (slow), so
# it's gated to main pushes, manual dispatch, and a weekly schedule.
name: msvc-syntax-check

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC

env:
  MSVC7_URL: https://github.com/colemancda/GunBound-Decomp/releases/download/0.1.0/msvc7.zip

jobs:
  msvc-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache msvc7 tree
        id: cache
        uses: actions/cache@v4
        with:
          path: tools/msvc-env/msvc7
          key: msvc7-tree-0.1.0

      - name: Download + extract msvc7 tree
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "$MSVC7_URL" -o /tmp/msvc7.zip
          # Zip holds msvc7/... at its root (+ macOS __MACOSX cruft we skip);
          # extracting into tools/msvc-env/ yields tools/msvc-env/msvc7/.
          unzip -q /tmp/msvc7.zip 'msvc7/*' -d tools/msvc-env
          test -f tools/msvc-env/msvc7/bin/cl.exe \
            || { echo "cl.exe missing after extract — check zip layout"; exit 1; }

      - name: Build gb-msvc image
        run: docker build --platform linux/amd64 -t gb-msvc tools/msvc-env

      - name: Run MSVC syntax check
        continue-on-error: true  # informational — compile errors don't fail CI
        run: tools/msvc-env/msvc_syntax_check.sh

      - name: Summarize
        if: always()
        run: |
          csv=tools/msvc_syntax_check_results.csv
          if [ -f "$csv" ]; then
            total=$(($(wc -l < "$csv") - 1))
            clean=$(grep -c ',1,' "$csv" || true)
            {
              echo '## msvc-syntax-check (cl.exe 13.10.3052)'
              echo ''
              echo "Files compiling clean: **$clean / $total**"
              echo ''
              echo '### Top error codes'
              echo '```'
              grep -vE ',1,' "$csv" | grep -oE 'error C[0-9]+' | sort | uniq -c | sort -rn | head -15 || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msvc-syntax-check-results
          path: tools/msvc_syntax_check_results.csv
          if-no-files-found: warn
