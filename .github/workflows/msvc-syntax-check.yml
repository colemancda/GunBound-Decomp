# Per-file real-MSVC-7.10 syntax check (tools/msvc-env/msvc_syntax_check.sh) on
# GitHub-hosted runners. Informational: uploads the results CSV and writes a
# clean/total summary, but never fails the build on compile errors.
#
# The MSVC 7.10 toolchain is proprietary and NOT in the repo, so this job pulls
# it from a private URL held in the MSVC7_TARBALL_URL secret. Create the tarball
# with (from repo root, msvc7 tree in place):
#     tar -czf msvc7.tar.gz -C tools/msvc-env/msvc7 .
# and host it privately (e.g. a presigned S3 / private release URL). Extracting
# it into tools/msvc-env/msvc7/ must yield bin/ include/ lib/ PlatformSDK/.
#
# Without the secret the job runs but no-ops with a note. It is NOT run on every
# PR — the full 1781-file sweep runs cl.exe under Wine (slow) and re-pulls the
# proprietary tree — so it's gated to main pushes, manual dispatch, and a weekly
# schedule.
name: msvc-syntax-check

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC

jobs:
  msvc-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Is the msvc7 secret configured?
        id: secret
        run: echo "enabled=${{ secrets.MSVC7_TARBALL_URL != '' }}" >> "$GITHUB_OUTPUT"

      - name: Note when disabled
        if: steps.secret.outputs.enabled != 'true'
        run: |
          {
            echo '## msvc-syntax-check — skipped'
            echo ''
            echo 'The `MSVC7_TARBALL_URL` secret is not set, so the proprietary'
            echo 'MSVC 7.10 tree cannot be provisioned. See'
            echo '`.github/workflows/msvc-syntax-check.yml` for how to configure it.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cache msvc7 tree
        if: steps.secret.outputs.enabled == 'true'
        id: cache
        uses: actions/cache@v4
        with:
          path: tools/msvc-env/msvc7
          key: msvc7-tree-v1

      - name: Download + extract msvc7 tree
        if: steps.secret.outputs.enabled == 'true' && steps.cache.outputs.cache-hit != 'true'
        env:
          URL: ${{ secrets.MSVC7_TARBALL_URL }}
        run: |
          mkdir -p tools/msvc-env/msvc7
          curl -fsSL "$URL" -o /tmp/msvc7.tar.gz
          tar -xzf /tmp/msvc7.tar.gz -C tools/msvc-env/msvc7
          test -f tools/msvc-env/msvc7/bin/cl.exe \
            || { echo "cl.exe missing after extract — check tarball layout"; exit 1; }

      - name: Build gb-msvc image
        if: steps.secret.outputs.enabled == 'true'
        run: docker build --platform linux/amd64 -t gb-msvc tools/msvc-env

      - name: Run MSVC syntax check
        if: steps.secret.outputs.enabled == 'true'
        continue-on-error: true  # informational — compile errors don't fail CI
        run: tools/msvc-env/msvc_syntax_check.sh

      - name: Summarize
        if: always() && steps.secret.outputs.enabled == 'true'
        run: |
          csv=tools/msvc_syntax_check_results.csv
          if [ -f "$csv" ]; then
            total=$(($(wc -l < "$csv") - 1))
            clean=$(grep -c ',1,' "$csv" || true)
            {
              echo '## msvc-syntax-check (cl.exe 13.10.3052)'
              echo ''
              echo "Files compiling clean: **$clean / $total**"
              echo ''
              echo '### Top error codes'
              echo '```'
              grep -vE ',1,' "$csv" | grep -oE 'error C[0-9]+' | sort | uniq -c | sort -rn | head -15 || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results CSV
        if: always() && steps.secret.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: msvc-syntax-check-results
          path: tools/msvc_syntax_check_results.csv
          if-no-files-found: warn
